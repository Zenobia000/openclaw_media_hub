<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1280, initial-scale=1.0">
  <title>OpenClaw</title>

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            "bg-primary":       "#0e1015",
            "bg-card":          "#161920",
            "bg-input":         "#1e2028",
            "border-default":   "#1e2028",
            "text-primary":     "#f4f4f5",
            "text-secondary":   "#d4d4d8",
            "text-muted":       "#838387",
            "accent-primary":   "#ff5c5c",
            "accent-secondary": "#14b8a6",
            "status-success":   "#22c55e",
            "status-error":     "#ef4444",
            "status-info":      "#3b82f6",
            "text-on-accent":   "#FFFFFF",
          },
          fontFamily: {
            sans: ["Inter", "sans-serif"],
          },
          borderRadius: {
            sm: "6px",
            md: "10px",
          },
        },
      },
    };
  </script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Custom Styles -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-bg-primary font-sans text-text-primary m-0 h-screen flex items-center justify-center">

  <!-- Bridge Status Card -->
  <div class="bg-bg-card border border-border-default rounded-md p-8 flex flex-col items-center gap-5 min-w-[320px]">
    <!-- Logo -->
    <div class="w-12 h-12 rounded-md bg-accent-primary flex items-center justify-center">
      <span class="text-text-on-accent text-lg font-800">OC</span>
    </div>

    <!-- Title -->
    <div class="text-center">
      <h1 class="text-2xl font-bold">OpenClaw</h1>
      <p class="text-text-secondary text-sm mt-1">GUI Application</p>
    </div>

    <!-- Status -->
    <div class="flex items-center gap-2">
      <div id="status-dot" class="w-2.5 h-2.5 rounded-full bg-text-muted animate-pulse"></div>
      <span id="status-text" class="text-text-muted text-sm">Connecting to Bridge...</span>
    </div>
  </div>

  <!-- App Script -->
  <script src="js/app.js" defer></script>
</body>
</html>
